<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>javascript variable </h1>

    <script>
        // var define = containers in js


        var myNme = "abes";
        document.write(myNme);
        console.log(myNme);
        //ja execution and scope (global and local)

        function demo(){
            var msg = "thanks" //local
            console.log(msg);

        }
        demo();
        //var declaration using let and const
        let msg2 = "thanks again";
        console.log(msg2);

        const msg3 = "thamks you broo";
        console.log(msg3);
    </script>
</body>
</html>
